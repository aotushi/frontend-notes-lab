<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data URL 与 Blob URL 对比</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #5f6b7a;
      --border: #d8e0ea;
      --accent: #0f766e;
      --accent-soft: #dff5f1;
      --code: #101828;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 22px 18px 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 17px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
    }

    code {
      padding: 2px 5px;
      border-radius: 4px;
      color: var(--code);
      background: #eef2f7;
    }

    .intro {
      margin-bottom: 16px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .panel {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .panel.full {
      grid-column: 1 / -1;
    }

    .preview {
      display: grid;
      place-items: center;
      min-height: 180px;
      border: 1px dashed #b8c2d0;
      border-radius: 6px;
      background:
        linear-gradient(90deg, rgba(15, 118, 110, 0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(15, 118, 110, 0.08) 1px, transparent 1px),
        #fbfdff;
      background-size: 24px 24px;
    }

    img {
      display: block;
      width: min(100%, 320px);
      height: auto;
      border: 1px solid #b7c6d8;
      border-radius: 6px;
      background: #ffffff;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .metric {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #f9fbfd;
    }

    .metric strong {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .metric span {
      display: block;
      overflow-wrap: anywhere;
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      border: 1px solid #0f766e;
      border-radius: 6px;
      padding: 8px 12px;
      color: #ffffff;
      background: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      color: var(--accent);
      background: #ffffff;
    }

    pre {
      margin: 0;
      padding: 13px;
      border-radius: 6px;
      overflow: auto;
      color: #dbeafe;
      background: #111827;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      white-space: pre-wrap;
    }

    @media (max-width: 760px) {
      .grid,
      .metrics {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Data URL 与 Blob URL 对比</h1>
    <p class="intro">同一段 SVG 同时渲染为 Data URL 和 Blob URL。观察 URL 长度、资源引用形式，以及撤销 Blob URL 后的行为。</p>

    <div class="grid">
      <section class="panel">
        <h2>Data URL</h2>
        <div class="preview">
          <img id="data-image" alt="Data URL 渲染的 SVG">
        </div>
      </section>

      <section class="panel">
        <h2>Blob URL</h2>
        <div class="preview">
          <img id="blob-image" alt="Blob URL 渲染的 SVG">
        </div>
      </section>

      <section class="panel full">
        <h2>实测数据</h2>
        <div class="metrics">
          <div class="metric">
            <strong>原始 SVG 字符数</strong>
            <span id="svg-length"></span>
          </div>
          <div class="metric">
            <strong>Data URL 字符数</strong>
            <span id="data-length"></span>
          </div>
          <div class="metric">
            <strong>Blob URL 字符数</strong>
            <span id="blob-length"></span>
          </div>
        </div>
        <div class="actions">
          <button type="button" id="rebuild">重新生成 Blob URL</button>
          <button type="button" class="secondary" id="revoke">撤销 Blob URL</button>
        </div>
      </section>

      <section class="panel full">
        <h2>控制台同款日志</h2>
        <pre id="log"></pre>
      </section>
    </div>
  </main>

  <script>
    var svg = [
      '<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">',
      '<rect width="320" height="180" fill="#dff5f1"/>',
      '<rect x="20" y="20" width="280" height="140" rx="12" fill="#fff" stroke="#0f766e" stroke-width="6"/>',
      '<text x="160" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f766e">Data URL</text>',
      '<text x="160" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#35524f">same SVG content</text>',
      '</svg>'
    ].join('');

    var dataUrl = 'data:image/svg+xml,' + encodeURIComponent(svg);
    var blobUrl = '';

    var dataImage = document.getElementById('data-image');
    var blobImage = document.getElementById('blob-image');
    var log = document.getElementById('log');

    dataImage.src = dataUrl;

    function renderMetrics(status) {
      document.getElementById('svg-length').textContent = svg.length;
      document.getElementById('data-length').textContent = dataUrl.length;
      document.getElementById('blob-length').textContent = blobUrl ? blobUrl.length : '已撤销';

      var lines = [
        'SVG text length: ' + svg.length,
        'Data URL length: ' + dataUrl.length,
        'Blob URL: ' + (blobUrl || 'revoked'),
        'Status: ' + status
      ];

      log.textContent = lines.join('\n');
      console.clear();
      lines.forEach(function (line) {
        console.log(line);
      });
    }

    function buildBlobUrl() {
      if (blobUrl) {
        URL.revokeObjectURL(blobUrl);
      }

      var blob = new Blob([svg], { type: 'image/svg+xml' });
      blobUrl = URL.createObjectURL(blob);
      blobImage.src = blobUrl;
      renderMetrics('Blob URL 已生成');
    }

    function revokeBlobUrl() {
      if (!blobUrl) {
        renderMetrics('Blob URL 已经撤销');
        return;
      }

      URL.revokeObjectURL(blobUrl);
      blobUrl = '';
      blobImage.removeAttribute('src');
      renderMetrics('Blob URL 已撤销，图片引用已清空');
    }

    document.getElementById('rebuild').addEventListener('click', buildBlobUrl);
    document.getElementById('revoke').addEventListener('click', revokeBlobUrl);
    buildBlobUrl();
  </script>
</body>
</html>
